<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Dashboard - Disaster Help Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    .volunteer-grid {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 1.5rem;
      height: calc(100vh - 150px);
    }
    
    .map-container {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #vMap {
      flex: 1;
      border-radius: var(--border-radius);
      border: 1px solid var(--glass-border);
    }

    .feed-container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      overflow-y: auto;
      padding-right: 0.5rem;
    }

    .feed-section {
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
    }

    .feed-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
      max-height: 40vh;
      overflow-y: auto;
    }

    .task-card {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 1rem;
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    /* Custom Scrollbar for feeds */
    .feed-list::-webkit-scrollbar {
      width: 6px;
    }
    .feed-list::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
    }
    .feed-list::-webkit-scrollbar-thumb {
      background: var(--glass-border);
      border-radius: 10px;
    }

    @media (max-width: 992px) {
      .volunteer-grid {
        grid-template-columns: 1fr;
        height: auto;
      }
      #vMap {
        min-height: 400px;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar Basic -->
  <nav class="navbar" style="padding: 0.5rem 0;">
    <div class="nav-container">
      <a href="index.html" class="nav-brand" style="font-size: 1.2rem;">
        <i class="fa-solid fa-heart-pulse"></i> Disaster Help <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: 500;">/ Volunteer</span>
      </a>
    </div>
  </nav>

  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="user-profile">
        <div class="avatar" style="background: linear-gradient(135deg, var(--info), var(--secondary-color))"><i class="fa-solid fa-handshake-angle"></i></div>
        <div class="user-name" id="userNameDisplay">Loading...</div>
        <div class="user-role">Volunteer Responder</div>
      </div>
      
      <nav class="sidebar-nav">
        <a href="#" class="sidebar-link active"><i class="fa-solid fa-map-location-dot"></i> Live Map</a>
        <a href="#" class="sidebar-link" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content" style="padding: 1.5rem;">
      <div class="page-header" style="margin-bottom: 1rem;">
        <h2><i class="fa-solid fa-satellite-dish" style="color: var(--primary-color);"></i> Live Emergency Dispatch</h2>
      </div>

      <div class="volunteer-grid">
        <!-- Map Column -->
        <div class="map-container glass-panel p-2">
          <div id="vMap"></div>
        </div>

        <!-- Feeds Column -->
        <div class="feed-container">
          
          <!-- Open Requests -->
          <div class="feed-section glass-panel">
            <h3 class="card-title" style="margin-bottom: 0;"><i class="fa-solid fa-tower-broadcast"></i> Nearby Open Requests</h3>
            <div class="feed-list" id="openFeed">
              <!-- JS Populated -->
            </div>
          </div>

          <!-- My Accepted Tasks -->
          <div class="feed-section glass-panel">
            <h3 class="card-title" style="margin-bottom: 0; color: var(--success);"><i class="fa-solid fa-clipboard-check"></i> My Active Tasks</h3>
            <div class="feed-list" id="activeTasksFeed">
              <!-- JS Populated -->
            </div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/data.js"></script>
  <script src="js/volunteer.js"></script>
</body>
</html>
