<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Disaster Help Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- Navbar Basic -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">
        <i class="fa-solid fa-heart-pulse"></i>
        Disaster Help Portal
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
      </div>
    </div>
  </nav>

  <!-- Login Area -->
  <main class="auth-container">
    <div class="glass-panel auth-card animate-fade-in">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Log in to your account</p>

      <!-- Role Tabs -->
      <div class="role-selector">
        <div class="role-tab active" data-role="victim">Victim</div>
        <div class="role-tab" data-role="volunteer">Volunteer</div>
        <div class="role-tab" data-role="admin">Admin</div>
      </div>
      
      <div id="authAlert" class="alert-msg"></div>

      <!-- Login Form -->
      <form id="authForm" class="auth-form">
        <input type="hidden" id="roleInput" value="victim">
        
        <div class="form-group">
          <label class="form-label" id="phoneLabel">Phone Number</label>
          <div style="position: relative;">
            <i class="fa-solid fa-user" style="position: absolute; left: 1rem; top: 1rem; color: var(--text-muted);"></i>
            <input type="text" id="phoneInput" class="form-control" style="padding-left: 2.5rem;" placeholder="e.g. 9876543210" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div style="position: relative;">
            <i class="fa-solid fa-lock" style="position: absolute; left: 1rem; top: 1rem; color: var(--text-muted);"></i>
            <input type="password" id="passwordInput" class="form-control" style="padding-left: 2.5rem;" placeholder="Enter your password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3" style="font-size: 1.1rem; padding: 1rem;">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register</a>
        <br><br>
        <small class="text-muted">Admin demo credentials: admin / admin</small>
      </div>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script>
    // Pre-select role tab from URL param before auth.js runs
    (function() {
      const params = new URLSearchParams(window.location.search);
      const role = params.get('role');
      if (role && ['victim', 'volunteer', 'admin'].includes(role)) {
        // Set hidden input
        const ri = document.getElementById('roleInput');
        if (ri) ri.value = role;
        // Update tab active states
        document.querySelectorAll('.role-tab').forEach(t => {
          t.classList.toggle('active', t.getAttribute('data-role') === role);
        });
        // If admin, change label
        if (role === 'admin') {
          const lbl = document.getElementById('phoneLabel');
          const inp = document.getElementById('phoneInput');
          if (lbl) lbl.textContent = 'Username';
          if (inp) { inp.type = 'text'; inp.placeholder = 'e.g. admin'; }
        }
      }
    })();
  </script>
  <script src="js/auth.js"></script>
</body>
</html>
