<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Disaster Help Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- Navbar Basic -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">
        <i class="fa-solid fa-heart-pulse"></i>
        Disaster Help Portal
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
      </div>
    </div>
  </nav>

  <!-- Register Area -->
  <main class="auth-container">
    <div class="glass-panel auth-card animate-fade-in" style="max-width: 500px;">
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join the platform to give or receive help</p>

      <!-- Role Tabs (Admin should not self-register usually, but for demo we don't include it here) -->
      <div class="role-selector">
        <div class="role-tab active" data-role="victim">I Need Help (Victim)</div>
        <div class="role-tab" data-role="volunteer">I Want to Help (Volunteer)</div>
      </div>
      
      <div id="authAlert" class="alert-msg"></div>

      <!-- Register Form -->
      <form id="authForm" class="auth-form">
        <!-- Hidden input set by get params or tab click default-->
        <input type="hidden" id="roleInput" value="victim">
        
        <script>
          // Pre-select tab based on URL param
          const params = new URLSearchParams(window.location.search);
          const roleFromUrl = params.get('role');
          if (roleFromUrl && (roleFromUrl === 'victim' || roleFromUrl === 'volunteer')) {
            document.querySelector('#roleInput').value = roleFromUrl;
            document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.role-tab[data-role="${roleFromUrl}"]`).classList.add('active');
          }
        </script>

        <div class="form-group">
          <label class="form-label">Full Name</label>
          <div style="position: relative;">
            <i class="fa-solid fa-id-card" style="position: absolute; left: 1rem; top: 1rem; color: var(--text-muted);"></i>
            <input type="text" id="nameInput" class="form-control" style="padding-left: 2.5rem;" placeholder="e.g. John Doe" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <div style="position: relative;">
            <i class="fa-solid fa-phone" style="position: absolute; left: 1rem; top: 1rem; color: var(--text-muted);"></i>
            <input type="tel" id="phoneInput" class="form-control" style="padding-left: 2.5rem;" placeholder="e.g. 9876543210" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Password</label>
            <div style="position: relative;">
              <i class="fa-solid fa-lock" style="position: absolute; left: 1rem; top: 1rem; color: var(--text-muted);"></i>
              <input type="password" id="passwordInput" class="form-control" style="padding-left: 2.5rem;" placeholder="Password" minlength="4" required>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <div style="position: relative;">
              <i class="fa-solid fa-lock" style="position: absolute; left: 1rem; top: 1rem; color: var(--text-muted);"></i>
              <input type="password" id="confirmPasswordInput" class="form-control" style="padding-left: 2.5rem;" placeholder="Confirm" minlength="4" required>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-2" style="font-size: 1.1rem; padding: 1rem;">
          Register Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign In</a>
      </div>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
